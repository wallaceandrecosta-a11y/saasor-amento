<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <defs>
    <linearGradient id="orvenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A4DFF" />
      <stop offset="100%" stop-color="#002385" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer technological ring -->
  <circle cx="50" cy="50" r="42" stroke="url(#orvenGrad)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.3" />
  <circle cx="50" cy="50" r="35" stroke="url(#orvenGrad)" stroke-width="1" opacity="0.15" />
  
  <!-- Clean central "O" brandmark inspired by high-end automotive indicators -->
  <path d="M50 20 C66.57 20 80 33.43 80 50 C80 66.57 66.57 80 50 80 C33.43 80 20 66.57 20 50 C20 33.43 33.43 20 50 20 Z" 
        stroke="url(#orvenGrad)" stroke-width="5" filter="url(#glow)" />
        
  <!-- Core direction indicator (speed/direction theme) -->
  <path d="M50 35 L62 55 L50 49 L38 55 Z" fill="#FFFFFF" />
</svg>
